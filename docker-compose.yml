

services:
  backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./python-backend:/app
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    command: |
      sh -c "echo 'API Key from env is: ' $OPENAI_API_KEY && uvicorn api:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./ui:/app
      - /app/node_modules
    depends_on:
      - backend
