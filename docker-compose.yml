services:
  backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
      target: runtime
      args:
        BUILDKIT_INLINE_CACHE: 1
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./python-backend:/app:ro
      - backend_cache:/app/.cache
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    env_file:
      - .env.backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=100m
      - /app/.cache:rw,noexec,nosuid,size=500m
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - app_network
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
      target: dev
      args:
        BUILDKIT_INLINE_CACHE: 1
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # Mapeamento específico para Next.js dev
      - ./ui/src:/app/src:ro
      - ./ui/public:/app/public:ro
      - ./ui/pages:/app/pages:ro
      - ./ui/components:/app/components:ro
      - ./ui/styles:/app/styles:ro
      - ./ui/next.config.js:/app/next.config.js:ro
      - nextjs_modules:/app/node_modules
      - nextjs_cache:/app/.next
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    networks:
      - app_network
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  nextjs_modules:
  nextjs_cache:

networks:
  app_network:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.0.0/16
