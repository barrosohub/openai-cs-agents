services:
  backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    volumes:
      - ./python-backend:/app:ro
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    healthcheck:
      disable: true
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./ui:/app:cached
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
